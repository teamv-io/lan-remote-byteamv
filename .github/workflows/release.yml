name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            bin: rust-p2p-viewer.exe
            formats: nsis

          - name: macOS Apple Silicon
            os: macos-14          # GitHub M1/M2 runner (arm64)
            bin: rust-p2p-viewer
            formats: dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # Defender real-time scanning of every .obj/.rlib/.exe is a big tax on the
      # Windows runner — exclude the workspace to speed up compile + link.
      - name: Exclude workspace from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: Add-MpPreference -ExclusionPath '${{ github.workspace }}'
        continue-on-error: true

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Smart incremental caching (registry + git + target), keyed on Cargo.lock.
      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      # Installers are only cut for tagged releases. Routine branch pushes just
      # build (fast validation) and skip packaging entirely.
      - name: Install cargo-binstall
        if: startsWith(github.ref, 'refs/tags/v')
        uses: cargo-bins/cargo-binstall@main

      - name: Build installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          # Prebuilt binary instead of compiling cargo-packager from source
          # (saves several minutes, especially on Windows/MSVC).
          cargo binstall -y cargo-packager
          cargo packager --release --formats ${{ matrix.formats }} --verbose
          mkdir -p out
          find target -maxdepth 3 \( -name "*.dmg" -o -name "*-setup.exe" \) -exec cp {} out/ \;
          echo "--- installers ---"
          ls -la out

      - name: Upload installer
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: out/*
          if-no-files-found: error

  # GitHub Release (installers only) is created when a v* tag is pushed.
  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release
          find artifacts -name "*.dmg" -exec cp {} "release/RustP2PViewer-macos-arm64.dmg" \;
          find artifacts -name "*-setup.exe" -exec cp {} "release/RustP2PViewer-windows-x64-setup.exe" \;
          echo "--- release assets ---"
          ls -la release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Rust P2P Viewer ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Install

            ### macOS (Apple Silicon)
            1. Download `RustP2PViewer-macos-arm64.dmg`, open it, drag the app to **Applications**.
            2. **Important** — macOS flags unsigned downloaded apps as "damaged". Clear the quarantine flag once (Terminal):
               ```
               xattr -cr "/Applications/Rust P2P Viewer.app"
               ```
            3. Open the app normally. (Not malware — just unsigned.)

            ### Windows (x64)
            Download `RustP2PViewer-windows-x64-setup.exe` and run it.
            SmartScreen may warn (unsigned) → **More info → Run anyway**.
          files: |
            release/*
