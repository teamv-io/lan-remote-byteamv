name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: lan-remote.exe

          - name: macOS Apple Silicon
            os: macos-14          # GitHub M1/M2 runner (arm64)
            target: aarch64-apple-darwin
            binary: lan-remote

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # openh264 downloads a prebuilt .so/.dll at build time — worth caching
      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lan-remote-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  # GitHub Release is only created when a v* tag is pushed
  publish:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mv artifacts/lan-remote-x86_64-pc-windows-msvc/lan-remote.exe  lan-remote-windows-x64.exe
          mv artifacts/lan-remote-aarch64-apple-darwin/lan-remote         lan-remote-macos-arm64
          chmod +x lan-remote-macos-arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "lan-remote ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            lan-remote-windows-x64.exe
            lan-remote-macos-arm64
